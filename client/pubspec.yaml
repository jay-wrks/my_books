name: aravind
description: Aravind Study Materials - PDF Subscription App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # WebSocket
  web_socket_channel: ^3.0.1
  # Security
  flutter_secure_storage: ^9.2.2
  # PDF viewer
  syncfusion_flutter_pdfviewer: ^27.1.48
  # Utils
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.0
  crypto: ^3.0.6
  http: ^1.2.2
  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  # Firebase (for direct PDF download from Storage)
  firebase_core: ^3.8.0
  firebase_storage: ^12.3.5
  screen_protector: ^1.5.1
  firebase_database: ^11.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
